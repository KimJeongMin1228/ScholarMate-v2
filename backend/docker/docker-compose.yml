services:
  django:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: scholarmate_django
    command: gunicorn ScholarMate_backend.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ..:/app
    env_file:
      - ../.env
    depends_on:
      - redis

  nginx:
    image: nginx:latest
    container_name: scholarmate_nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ../staticfiles:/app/staticfiles
    depends_on:
      - django

  redis:
    image: redis:7
    container_name: scholarmate_redis